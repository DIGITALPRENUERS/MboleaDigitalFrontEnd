# Mbolea frontend — deploy from this repo root (leave Railway "Root Directory" empty).
#
# API: default is .env.production (Mbolea backend). Override with variable VITE_API_BASE_URL
# (must include /api, e.g. https://mboleadigitalbackend-production.up.railway.app/api) at build time if needed.
#
# https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"
# npm install avoids npm ci + BuildKit cache on node_modules/.cache (EBUSY). NODE_ENV=development keeps devDependencies for vite build.
buildCommand = "NODE_ENV=development npm install && npm run build"
watchPatterns = ["src/**", "public/**", "index.html", "package.json", "package-lock.json", "vite.config.js", "*.config.js", "tailwind.config.*", "postcss.config.*"]

[deploy]
# Bind 0.0.0.0; Railway sets PORT.
startCommand = "sh -c 'exec ./node_modules/.bin/serve -s dist -l tcp://0.0.0.0:${PORT:-3000}'"
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/"
healthcheckTimeout = 300
