# Mbolea frontend — deploy from this repo root (leave Railway "Root Directory" empty).
#
# API: default is .env.production (Mbolea backend). Override with variable VITE_API_BASE_URL
# (must include /api, e.g. https://mboleadigitalbackend-production.up.railway.app/api) at build time if needed.
#
# https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Custom Dockerfile avoids Railway-generated npm ci + cache mount on node_modules/.cache (EBUSY).
watchPatterns = ["src/**", "public/**", "scripts/**", "nginx/**", "index.html", "package.json", "package-lock.json", "vite.config.js", "*.config.js", "tailwind.config.*", "postcss.config.*", "Dockerfile"]

[deploy]
# Runtime image is nginx; listen port comes from $PORT (see nginx/default.conf.template). Match public domain target port to that.
# https://docs.railway.com/networking/troubleshooting/application-failed-to-respond
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/"
healthcheckTimeout = 300
